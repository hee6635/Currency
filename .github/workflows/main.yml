name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ① 이전 실행의 잘못된 캐시/경로 제거 (도돌이표 방지)
      - name: Clean previous buildozer caches
        run: rm -rf .buildozer .buildozer_global

      # ② Buildozer로 빌드 실행 (성공이 보장된 액션 사용)
      - name: Build with Buildozer
        id: buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        env:
          USER: root
          PIP_BREAK_SYSTEM_PACKAGES: "1"
          # NDK 버전을 꽉 묶어서 컴파일 에러를 원천 차단합니다.
          BUILDOZER_ANDROID_NDK_VERSION: "25.2.9519653"
        with:
          workdir: .
          buildozer_version: stable

      # ③ 권한 복구
      - name: Fix workspace permissions
        run: sudo chown -R $USER:$USER "${{ github.workspace }}"

      # ④ APK 위치 로깅 + 경로 탐색
      - name: Locate APK
        id: locate
        shell: bash
        run: |
          echo "buildozer output filename: '${{ steps.buildozer.outputs.filename }}'"
          APK="${{ steps.buildozer.outputs.filename }}"
          if [[ -z "$APK" || ! -f "$APK" ]]; then
            APK="$(ls -1 bin/*.apk 2>/dev/null | head -n 1 || true)"
          fi
          if [[ -z "$APK" || ! -f "$APK" ]]; then
            APK="$(find . -maxdepth 5 -type f -name '*.apk' | head -n 1 || true)"
          fi
          echo "APK path resolved to: $APK"
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      # ⑤ 빌드 결과물 업로드
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExchangeApp_APK-${{ github.run_number }}
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14
