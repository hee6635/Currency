name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          # 파이썬 빌드에 필요한 '모든' 라이브러리를 하나도 빠짐없이 넣었습니다.
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          python3-dev python3-pip python3-setuptools build-essential \
          libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev libgdbm-dev \
          libgdbm-compat-dev libreadline-dev libnss3-dev libossp-uuid-dev \
          m4 libltdl-dev uuid-dev libexpat1-dev libbluetooth-dev libsqlite3-dev \
          tk-dev libgdbm-dev libbz2-dev

          # Cython 버전을 정확히 0.29.33으로 고정해야 컴파일 에러가 안 납니다.
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          # 캐시 오류를 방지하기 위해 dist를 청소하고 빌드합니다.
          buildozer android clean
          buildozer -v android debug
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-ExchangeApp
          path: bin/*.apk
