name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-24.04  # 2026년 기준 가장 안정적인 최신 버전입니다
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # 공식 도구의 v1 버전을 명시하여 경로 문제를 해결합니다
        uses: kivy/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Upload APK
        # 중단(Deprecated) 에러가 없는 최신 v4 버전입니다
        uses: actions/upload-artifact@v4
        with:
          name: ExchangeApp-APK
          path: bin/*.apk
