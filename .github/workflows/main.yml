name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    # 1. 문제의 원인이었던 최신 Ubuntu(24.04) 대신 안정적인 22.04 버전으로 고정합니다.
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev

    - name: Install python tools
      run: |
        pip install --upgrade pip
        # 2. Kivy 빌드 충돌을 막기 위해 cython 버전을 3.0 미만으로 제한합니다.
        pip install buildozer "cython<3.0"

    - name: Initialize buildozer
      run: |
        buildozer init || true

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
