name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          # -luuid 에러 해결을 위해 uuid-dev를 추가했습니다.
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          python3-dev python3-pip python3-setuptools build-essential \
          libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev libgdbm-dev \
          libgdbm-compat-dev libreadline-dev libnss3-dev libossp-uuid-dev \
          m4 libltdl-dev uuid-dev

          # Cython 3.x 충돌 방지를 위해 0.29.33 고정
          pip3 install --user --upgrade "Cython<3.0" buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          # 상세 로그(-v) 출력
          buildozer -v android debug
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ExchangeApp-Final
          path: bin/*.apk
