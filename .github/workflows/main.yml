name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 빌드 속도 향상을 위한 캐시 설정
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install dependencies
        run: |
          sudo apt update
          # libtinfo5 대신 libtinfo6를 사용하고, 최신 빌드에 필요한 패키지들입니다.
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          python3-dev python3-pip python3-setuptools build-essential \
          libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev libgdbm-dev \
          libgdbm-compat-dev libreadline-dev libnss3-dev libossp-uuid-dev \
          libncurses-dev
          
          # Cython 버전 고정 및 Buildozer 설치
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 빌드 도중 멈춤 방지를 위해 'yes' 명령어로 라이선스 자동 승인
          yes | buildozer android debug
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VietnamExchange-APK
          path: bin/*.apk
