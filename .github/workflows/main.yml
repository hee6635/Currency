name: Build APK
on: [push]

jobs:
  build:
    # 2026년 기준 가장 안정적인 빌드 환경인 22.04를 사용합니다.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          # autoconf 에러를 막기 위해 m4와 libtool 설정을 강화합니다.
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          python3-dev python3-pip python3-setuptools build-essential \
          libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev libgdbm-dev \
          libgdbm-compat-dev libreadline-dev libnss3-dev libossp-uuid-dev \
          m4 libltdl-dev

          # 2026년 환경에 맞는 Cython과 Buildozer 버전 설치
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 로그를 상세히 보기 위해 -v 옵션을 추가했습니다.
          buildozer -v android debug
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyCalculator-APK
          path: bin/*.apk
