name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # 검증된 다른 빌드 액션(Entepotenz)을 최신 버전으로 사용
        uses: enetpotenz/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11

      - name: Upload APK
        # 최신 v4 버전 사용 (필수)
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
