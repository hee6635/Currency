name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update

        sudo apt install -y \
        python3-pip \
        build-essential \
        git zip unzip \
        openjdk-17-jdk \
        autoconf libtool pkg-config \
        zlib1g-dev \
        libncurses5-dev libncursesw5-dev \
        libtinfo5 \
        cmake \
        libffi-dev \
        libssl-dev \
        uuid-dev \
        liblzma-dev \
        libsqlite3-dev \
        libbz2-dev \
        libreadline-dev \
        libgdbm-dev \
        libexpat1-dev \
        libgmp-dev \
        libmpfr-dev \
        libmpc-dev \
        tk-dev \
        gawk \
        python3-dev

    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36

    - name: Build APK
      run: |
        rm -rf .buildozer

        # Python build 문제 해결
        export ac_cv_header_lzma_h=no
        export ac_cv_lib_uuid_uuid_generate=no
        export ac_cv_func_getgrent=no

        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: currency-apk
        path: bin/*.apk
