name: Final Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        # 파이썬과 안드로이드 빌드에 필요한 모든 부품을 설치합니다.
        sudo apt install -y \
          python3-pip build-essential git zip unzip \
          openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev \
          uuid-dev libuuid1 liblzma-dev libsqlite3-dev libbz2-dev \
          libreadline-dev libgdbm-dev libdb5.3-dev \
          libexpat1-dev libgmp-dev libmpfr-dev libmpc-dev \
          tk-dev libgdbm-compat-dev gawk python3-dev

    - name: Install python tools
      run: |
        pip install --upgrade pip
        # Kivy 2.3.0과 가장 잘 맞는 Cython 버전을 사용합니다.
        pip install "buildozer==1.5.0" "Cython==0.29.33"

    - name: Build APK
      run: |
        # 이전 기록 완전 삭제
        rm -rf .buildozer/
        
        # 링커가 uuid를 찾을 수 있게 경로를 강제로 뚫어줍니다.
        export LDFLAGS="-L/usr/lib/x86_64-linux-gnu"
        export LIBRARY_PATH="/usr/lib/x86_64-linux-gnu"
        
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My_Currency_App
        path: bin/*.apk
