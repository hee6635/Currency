name: Final Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip build-essential git zip unzip \
          openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev

    - name: Install python tools
      run: |
        pip install --upgrade pip
        # Kivy와 가장 호환성이 좋은 Cython 0.29.33 버전으로 고정
        pip install "buildozer==1.5.0" "Cython==0.29.33"

    - name: Build APK
      run: |
        # 이전 실패 찌꺼기 폴더를 삭제하고 깔끔하게 빌드 시작
        rm -rf .buildozer/
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Vietnam_Currency_App
        path: bin/*.apk
