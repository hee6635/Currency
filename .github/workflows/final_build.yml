name: Final Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        # 4가지 에러를 한 번에 잡기 위한 필수 패키지 총동원
        sudo apt install -y \
          python3-pip build-essential git zip unzip \
          openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev \
          uuid-dev liblzma-dev libsqlite3-dev libbz2-dev \
          libreadline-dev libgdbm-dev libdb5.3-dev \
          libexpat1-dev libgmp-dev libmpfr-dev libmpc-dev \
          tk-dev libgdbm-compat-dev

    - name: Install python tools
      run: |
        pip install --upgrade pip
        # jnius 에러 방지를 위해 Cython 버전을 0.29.36으로 유지
        pip install "buildozer==1.5.0" "Cython==0.29.36"

    - name: Build APK
      run: |
        # [중요] .buildozer 폴더를 완전히 삭제해서 이전 에러 기록을 지웁니다.
        rm -rf .buildozer/
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Vietnam_Currency_App
        path: bin/*.apk
