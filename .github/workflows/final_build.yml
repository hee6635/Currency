name: Final Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        # 링커가 길을 잃지 않도록 모든 uuid 관련 패키지를 설치합니다.
        sudo apt install -y \
          python3-pip build-essential git zip unzip \
          openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev \
          uuid-dev libuuid1 liblzma-dev libsqlite3-dev libbz2-dev \
          libreadline-dev libgdbm-dev libdb5.3-dev \
          libexpat1-dev libgmp-dev libmpfr-dev libmpc-dev \
          tk-dev libgdbm-compat-dev gawk python3-dev

    - name: Install python tools
      run: |
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "Cython==0.29.36"

    - name: Build APK
      run: |
        rm -rf .buildozer/
        # [핵심] 링커에게 라이브러리 경로를 강제로 주입합니다.
        export LDFLAGS="-L/usr/lib/x86_64-linux-gnu"
        export LIBRARY_PATH="/usr/lib/x86_64-linux-gnu"
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Vietnam_Currency_App
        path: bin/*.apk
