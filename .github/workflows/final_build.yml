name: Final Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        # gawk와 python3-dev를 추가하여 설계도 작성을 돕습니다.
        sudo apt install -y \
          python3-pip build-essential git zip unzip \
          openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev \
          uuid-dev liblzma-dev libsqlite3-dev libbz2-dev \
          libreadline-dev libgdbm-dev libdb5.3-dev \
          libexpat1-dev libgmp-dev libmpfr-dev libmpc-dev \
          tk-dev libgdbm-compat-dev gawk python3-dev

    - name: Install python tools
      run: |
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "Cython==0.29.36"

    - name: Build APK
      run: |
        rm -rf .buildozer/
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Vietnam_Currency_App
        path: bin/*.apk
